<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Una cucharita más - Catálogo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="min-h-screen pb-10">

    <!-- Botón Flotante del Carrito (Reemplaza al del Header) -->
    <button data-action="toggleCart" class="floating-cart fixed top-6 right-6 z-50 bg-amber-900 text-white p-4 rounded-2xl active:scale-90 transition-all cursor-pointer">
        <i class="fa-solid fa-cart-shopping text-xl"></i>
        <span id="cart-count" class="absolute -top-1 -right-1 bg-verde text-white text-[10px] font-bold h-5 w-5 rounded-full flex items-center justify-center border-2 border-white hidden">0</span>
    </button>

    <!-- Vista de Selección de Categorías -->
    <section id="categories-view" class="px-6 pt-12 animate-content">
        <div class="text-center mb-10">
            <!-- Logo Grande con Fallback -->
            <div class="mx-auto w-28 h-28 mb-6 relative shadow-2xl rounded-full p-1 bg-white">
                <img src="WhatsApp Image 2026-04-15 at 23.23.00.jpeg" 
                     alt="Logo Grande" 
                     class="w-full h-full object-cover rounded-full"
                     onerror="this.parentElement.innerHTML='<div class=\'w-full h-full flex items-center justify-center text-4xl text-chocolate\'><i class=\'fa-solid fa-spoon\'></i></div>'">
            </div>
            <h2 class="text-3xl font-black text-chocolate">¿Que vas a elegir hoy?</h2>
        </div>

        <div class="grid grid-cols-1 gap-6">
            <!-- Card Chocolates -->
            <div data-action="selectCategory" data-category="chocolates" class="category-card relative h-60 rounded-[40px] overflow-hidden shadow-lg border-4 border-white cursor-pointer">
                <img src="https://images.unsplash.com/photo-1548907040-4baa42d10919?auto=format&fit=crop&q=80&w=800" class="absolute inset-0 w-full h-full object-cover">
                <div class="absolute inset-0 bg-gradient-to-t from-chocolate/90 via-chocolate/20 to-transparent"></div>
                <div class="absolute bottom-6 left-8 text-white">
                    <p class="text-[10px] font-bold uppercase tracking-widest text-verde mb-1">Premium</p>
                    <h3 class="text-3xl font-black">Chocolates <i class="fa-solid fa-arrow-right-long text-sm ml-2 opacity-50"></i></h3>
                </div>
            </div>
            <!-- Card Postres -->
            <div data-action="selectCategory" data-category="postres" class="category-card relative h-60 rounded-[40px] overflow-hidden shadow-lg border-4 border-white cursor-pointer">
                <img src="https://images.unsplash.com/photo-1551024506-0bccd828d307?auto=format&fit=crop&q=80&w=800" class="absolute inset-0 w-full h-full object-cover">
                <div class="absolute inset-0 bg-gradient-to-t from-chocolate/90 via-chocolate/20 to-transparent"></div>
                <div class="absolute bottom-6 left-8 text-white">
                    <p class="text-[10px] font-bold uppercase tracking-widest text-verde mb-1">Artesanal</p>
                    <h3 class="text-3xl font-black">Postres <i class="fa-solid fa-arrow-right-long text-sm ml-2 opacity-50"></i></h3>
                </div>
            </div>

        </div>
    </section>

    <!-- Vista de Lista de Productos -->
    <section id="products-view" class="hidden animate-content">
        <!-- Header de productos sticky desde arriba -->
        <div class="px-6 pt-10 pb-1 flex items-center justify-center sticky top-0 bg-[#f2e9dc]/95 backdrop-blur-md z-30 relative">
            <button data-action="showCategories" class="absolute left-6 bg-white text-chocolate px-5 py-3 rounded-2xl font-bold flex items-center gap-2 border border-[#e5d9c8] text-sm active:scale-95 transition-all shadow-sm cursor-pointer">
                <i class="fa-solid fa-chevron-left text-xs"></i> Inicio
            </button>
            <h2 id="current-category-title" class="text-xl font-black text-chocolate capitalize">Postres</h2>
        </div>

        <main id="product-container" class="px-6 py-8 grid grid-cols-1 gap-4 ">
            <!-- Renderizado vía JS -->
        </main>
    </section>

    <!-- Modal del Carrito -->
    <div id="cart-modal" class="fixed inset-0 z-[60] hidden">
        <div class="absolute inset-0 bg-chocolate/40 backdrop-blur-sm cursor-pointer" data-action="toggleCart"></div>
        <div class="absolute bottom-0 left-0 right-0 h-[85vh] bg-white rounded-t-[50px] shadow-2xl flex flex-col translate-y-full transition-transform duration-500" id="cart-sheet">
            <div class="w-12 h-1.5 bg-[#e5d9c8] rounded-full mx-auto mt-4 mb-2"></div>

            <div class="px-8 py-6 flex justify-between items-end">
                <div>
                    <h2 class="text-2xl font-black text-chocolate leading-none">Tu pedido</h2>
                    <p class="text-gray-400 text-xs mt-2 uppercase tracking-widest">Una cucharita más</p>
                </div>
                <button data-action="toggleCart" class="bg-[#f2e9dc] p-3 rounded-2xl text-chocolate active:rotate-90 transition-transform cursor-pointer">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>

            <div class="flex-1 overflow-y-auto px-8 py-2 space-y-4 no-scrollbar">
                <div id="cart-items-list" class="space-y-4"></div>
                <div id="empty-cart-msg" class="flex flex-col items-center justify-center py-20 text-[#e5d9c8]">
                    <i class="fa-solid fa-ice-cream text-6xl mb-6"></i>
                    <p class="font-bold text-gray-300">¡Tu bolsa está vacía!</p>
                </div>
            </div>

            <div class="p-8 bg-[#f2e9dc]/40 border-t border-[#e5d9c8] rounded-t-[40px]">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-gray-400 font-bold uppercase tracking-widest text-[10px]">Total de hoy</span>
                    <span id="cart-total" class="text-3xl font-black text-chocolate">$0</span>
                </div>
                <div class="mb-4">
                    <label for="delivery-address" class="text-gray-400 font-bold uppercase tracking-widest text-[10px] mb-1 block">Dirección de envío</label>
                    <input type="text" id="delivery-address" placeholder="Ej: Av. San Martín 1234, Reconquista" 
                        class="w-full px-4 py-3 rounded-2xl border border-[#e5d9c8] bg-white text-sm text-gray-700 focus:outline-none focus:ring-2 focus:ring-[#5c3a1e]/30 placeholder:text-gray-300">
                </div>
                <div class="mb-4">
                    <span class="text-gray-400 font-bold uppercase tracking-widest text-[10px] mb-2 block">Método de pago</span>
                    <div class="flex gap-3">
                        <label class="flex-1 cursor-pointer">
                            <input type="radio" name="payment-method" value="efectivo" class="hidden peer">
                            <div class="flex items-center justify-center gap-2 px-4 py-3 rounded-2xl border border-[#e5d9c8] bg-white text-sm text-gray-400 peer-checked:border-[#5c3a1e] peer-checked:bg-[#5c3a1e] peer-checked:text-white transition-all">
                                <i class="fa-solid fa-money-bill-wave"></i>
                                <span class="font-semibold">Efectivo</span>
                            </div>
                        </label>
                        <label class="flex-1 cursor-pointer">
                            <input type="radio" name="payment-method" value="transferencia" class="hidden peer">
                            <div class="flex items-center justify-center gap-2 px-4 py-3 rounded-2xl border border-[#e5d9c8] bg-white text-sm text-gray-400 peer-checked:border-[#5c3a1e] peer-checked:bg-[#5c3a1e] peer-checked:text-white transition-all">
                                <i class="fa-solid fa-building-columns"></i>
                                <span class="font-semibold">Transferencia</span>
                            </div>
                        </label>
                    </div>
                </div>
                <button data-action="sendWhatsAppOrder" class="btn-confirm w-full text-white font-bold py-5 rounded-[28px] flex items-center justify-center gap-4 active:scale-95 transition-all text-lg cursor-pointer">
                    <i class="fa-brands fa-whatsapp text-2xl"></i>
                    Confirmar Pedido
                </button>
            </div>
        </div>
    </div>

    <!-- Modal de Detalle del Producto -->
    <div id="product-detail-modal" class="fixed inset-0 z-[70] hidden">
        <div class="absolute inset-0 bg-chocolate/50 backdrop-blur-sm cursor-pointer" data-action="closeProductDetail"></div>
        <div class="absolute top-[15%] bottom-[15%] left-[10%] right-[10%] bg-white rounded-[40px] shadow-2xl flex flex-col overflow-hidden translate-y-full transition-transform duration-500" id="product-detail-sheet">
            <!-- Imagen del producto -->
            <div class="relative h-64 overflow-hidden">
                <img id="product-detail-img" src="" class="w-full h-full object-cover" alt="">
                <button data-action="closeProductDetail" class="absolute top-6 right-6 bg-white/80 backdrop-blur w-12 h-12 rounded-2xl text-chocolate active:rotate-90 transition-transform shadow-lg flex items-center justify-center cursor-pointer">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>
            
            <!-- Información del producto -->
            <div class="flex-1 p-8 flex flex-col">
                <div class="flex-1">
                    <h2 id="product-detail-name" class="text-3xl font-black text-chocolate leading-tight mb-3">Nombre del Producto</h2>
                    <p id="product-detail-desc" class="text-gray-500 text-base leading-relaxed mb-6">Descripción del producto aquí...</p>
                    <div class="flex items-center justify-between mb-8">
                        <span class="text-gray-400 font-bold uppercase tracking-widest text-xs">Precio</span>
                        <span id="product-detail-price" class="text-4xl font-black text-chocolate">$0</span>
                    </div>
                </div>
                
                <!-- Botón agregar al carrito -->
                <button id="product-detail-add-btn" class="bg-[#7d8c56] text-white font-bold py-5 rounded-[28px] flex items-center justify-center gap-4 active:scale-95 transition-all text-lg shadow-lg cursor-pointer">
                    <i class="fa-solid fa-plus text-xl"></i>
                    Agregar al Carrito
                </button>
            </div>
        </div>
    </div>

    <!-- Toast / Notificación -->
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-chocolate text-white px-8 py-4 rounded-3xl text-sm font-bold shadow-2xl opacity-0 transition-all pointer-events-none z-[80] flex items-center gap-3 translate-y-10">
        <i class="fa-solid fa-heart text-verde"></i>
        <span id="toast-text">¡Agregado!</span>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
